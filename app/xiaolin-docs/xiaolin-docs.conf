upstream xiaolin-service {
    server 124.222.98.227:8080;
}

server {
    listen 443 ssl;
    server_name www.xiaolinstar.cn xiaolinstar.cn www.xiaolinstar.com xiaolinstar.com localhost;

    ssl_certificate /etc/nginx/cert/xiaolin-docs/xiaolinstar.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/xiaolin-docs/xiaolinstar.cn.key;
    ssl_certificate /etc/nginx/cert/xiaolin-docs/xiaolinstar.com/xiaolinstar.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/xiaolin-docs/xiaolinstar.com/xiaolinstar.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    access_log  /var/log/nginx/host.access.log  main;

    location / {
        proxy_pass http://xiaolin-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

server {
    listen 443 ssl;
    server_name www.xiaolinstar.com xiaolinstar.com;

    ssl_certificate /etc/nginx/cert/xiaolin-docs/xiaolinstar.com/xiaolinstar.com_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/xiaolin-docs/xiaolinstar.com/xiaolinstar.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    return 301 https://www.xiaolinstar.cn$request_uri;
}
