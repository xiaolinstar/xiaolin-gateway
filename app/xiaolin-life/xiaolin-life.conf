upstream xiaolin-life {
    server 124.222.98.227:8080;
    # 可以添加更多后端服务器进行负载均衡
}

server {
    listen 443 ssl;
    server_name www.xiaolin.fun xiaolin.fun localhost;

    # 腾讯云免费证书（手动上传到服务器对应目录）
    ssl_certificate /etc/nginx/cert/xiaolin-life/xiaolin.fun_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/xiaolin-life/xiaolin.fun.key;

    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    access_log  /var/log/nginx/host.access.log  main;

    location / {
        proxy_pass http://xiaolin-life;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
