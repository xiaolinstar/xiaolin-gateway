services:
  nginx-gateway:
    image: nginx:alpine3.20-perl
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 网关统一入口：负责 80->443 跳转，并 include 各项目配置（一个 Nginx 处理多域名）
      - ./app/gateway.conf:/etc/nginx/conf.d/default.conf:ro

      # 各项目 Nginx 配置（在 app/<project>/*.conf 下新增即可）
      - ./app:/etc/nginx/app:ro

      # 证书（腾讯云免费证书：手动上传到服务器对应目录）
      - ./app/xiaolin-docs/cert:/etc/nginx/cert/xiaolin-docs:ro
      - ./app/xiaolin-life/cert:/etc/nginx/cert/xiaolin-life:ro
    restart: unless-stopped
