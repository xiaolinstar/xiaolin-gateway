upstream ai-todo-api {
    server 124.222.98.227:8082;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wodi.games www.wodi.games localhost;

    ssl_certificate /etc/nginx/cert/ai-todo/wodi.games_bundle.crt;
    ssl_certificate_key /etc/nginx/cert/ai-todo/wodi.games.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    access_log  /var/log/nginx/host.access.log  main;

    location / {
        proxy_pass http://ai-todo-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
