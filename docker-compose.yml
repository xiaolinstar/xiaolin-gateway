services:
  nginx-gateway:
    image: nginx:alpine3.20-perl
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # undercover 配置文件
      # - ./app/undercover/undercover.conf:/etc/nginx/conf.d/default.conf:ro # 覆盖 default.conf
      # - ./app/undercover/cert:/etc/nginx/cert/undercover:ro

      # xiaolin-docs 配置文件
      - ./app/xiaolin-docs/xiaolin-docs.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/xiaolin-docs/cert:/etc/nginx/cert/xiaolin-docs:ro
    restart: unless-stopped
