services:
  nginx-gateway:
    image: nginx:alpine3.20-perl
    container_name: nginx-gateway
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./app/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app:/etc/nginx/app:ro
      - ./app/xiaolin-docs/cert:/etc/nginx/cert/xiaolin-docs:ro
      - ./app/xiaolin-life/cert:/etc/nginx/cert/xiaolin-life:ro
      - ./app/ai-todo/cert:/etc/nginx/cert/ai-todo:ro
    networks:
      - gateway-network
    restart: always

networks:
  gateway-network:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.35.0.0/16
        - subnet: fd00:abcd::/48